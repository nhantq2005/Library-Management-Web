name: Tự động Deploy ReactJS lên GitHub Pages

# Kịch bản này sẽ chạy mỗi khi bạn push code lên nhánh "main"
on:
  push:
    branches:
      - main # (Nếu nhánh chính của bạn tên là master thì đổi chữ main thành master)

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Tải mã nguồn về máy chủ GitHub Actions
        uses: actions/checkout@v3

      - name: ⚙️ Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Bạn có thể đổi sang version Node.js bạn đang dùng

      - name: 📦 Cài đặt thư viện (NPM Install)
        run: npm install

      - name: 🛠️ Build dự án React
        run: npm run build

      - name: 🚀 Đẩy bản build lên GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # NẾU BẠN DÙNG VITE: Đổi './build' thành './dist'
          publish_dir: ./build
