name: Tự động Deploy ReactJS lên GitHub Pages

on:
  push:
    branches:
      - main 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🛎️ Tải mã nguồn về máy chủ GitHub Actions
        uses: actions/checkout@v3

      - name: ⚙️ Cài đặt Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Cài đặt thư viện (NPM Install)
        run: npm install

      - name: 🛠️ Build dự án React
        run: CI=false npm run build

      - name: 🚀 Đẩy bản build lên GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
